services:
  mysql:
    image: mysql:8.0
    container_name: festival_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: festival_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/${REPO_USER}/festival-app:latest
    container_name: festival-app
    env_file:
      - .env
    ports:
      - "80:5000"
    volumes:
      - poster_data:/app/static/posters
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  poster_data:
